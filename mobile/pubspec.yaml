name: contentos
description: "AI Content Distribution OS - Creator Operating System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0

  # Navigation
  go_router: ^14.0.0

  # Supabase
  supabase_flutter: ^2.8.0

  # UI
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lucide_icons: ^0.257.0

  # Storage
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.3

  # HTTP
  http: ^1.2.0

  # Date
  intl: ^0.20.2

  # Splash
  flutter_native_splash: ^2.4.0

  # Ads
  google_mobile_ads: ^4.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
