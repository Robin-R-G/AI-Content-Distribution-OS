openapi: 3.1.0
info:
  title: Social Media AI - Content Distribution API
  version: 1.0.0
  description: |
    Complete API for AI-powered social media content creation, scheduling,
    analytics, and multi-platform distribution.
  contact:
    name: API Support
    email: api-support@contentdistribution.ai
  license:
    name: Proprietary
    url: https://contentdistribution.ai/license

servers:
  - url: https://api.contentdistribution.ai/v1
    description: Production
  - url: https://staging-api.contentdistribution.ai/v1
    description: Staging

security:
  - BearerAuth: []

tags:
  - name: Authentication
    description: User registration, login, OAuth, MFA
  - name: Users
    description: User profile and session management
  - name: Organizations
    description: Organization CRUD, members, invitations
  - name: Workspaces
    description: Workspace CRUD, members, connected accounts
  - name: Posts
    description: Post creation, publishing, scheduling
  - name: Media
    description: Media upload and management
  - name: AI
    description: AI content generation and prediction
  - name: Analytics
    description: Performance analytics and reporting
  - name: Schedule
    description: Calendar and queue management
  - name: Notifications
    description: User notifications
  - name: Billing
    description: Subscription and payment management
  - name: Webhooks
    description: Webhook management
  - name: Templates
    description: Content templates
  - name: Integrations
    description: Third-party integrations

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login with credentials
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout and revoke tokens
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '204':
          description: Logout successful

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Request password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                      expiresIn:
                        type: integer

  /auth/reset-password:
    post:
      tags: [Authentication]
      summary: Reset password with token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successful
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/verify-email:
    post:
      tags: [Authentication]
      summary: Verify email address
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Email verified
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/mfa/setup:
    post:
      tags: [Authentication]
      summary: Initialize MFA setup
      responses:
        '200':
          description: MFA setup initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      secret:
                        type: string
                      qrCodeUrl:
                        type: string
                      qrCodeImage:
                        type: string
                      recoveryCodes:
                        type: array
                        items:
                          type: string

  /auth/mfa/verify:
    post:
      tags: [Authentication]
      summary: Verify MFA code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: '^\d{6}$'
                mfaToken:
                  type: string
      responses:
        '200':
          description: MFA verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /oauth/{provider}:
    get:
      tags: [Authentication]
      summary: Initiate OAuth flow
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github, twitter, linkedin, facebook]
        - name: redirect_uri
          in: query
          schema:
            type: string
            format: uri
        - name: state
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to OAuth provider

  /oauth/{provider}/callback:
    get:
      tags: [Authentication]
      summary: Handle OAuth callback
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OAuth authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      parameters:
        - name: include
          in: query
          schema:
            type: string
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [Users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [Users]
      summary: Delete user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                reason:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: Account scheduled for deletion

  /users/me/avatar:
    post:
      tags: [Users]
      summary: Upload user avatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      avatar:
                        type: string
                        format: uri
                      avatarThumbnail:
                        type: string
                        format: uri

  /users/me/sessions:
    get:
      tags: [Users]
      summary: List active sessions
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Sessions list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSessions'

    delete:
      tags: [Users]
      summary: Terminate all other sessions
      responses:
        '200':
          description: Sessions terminated

  /users/me/sessions/{sessionId}:
    delete:
      tags: [Users]
      summary: Terminate specific session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session terminated
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations:
    post:
      tags: [Organizations]
      summary: Create organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'

    get:
      tags: [Organizations]
      summary: List user's organizations
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Organizations list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizations'

  /organizations/{organizationId}:
    get:
      tags: [Organizations]
      summary: Get organization details
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
        - name: include
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Organizations]
      summary: Update organization
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
      responses:
        '200':
          description: Organization updated

    delete:
      tags: [Organizations]
      summary: Delete organization
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmSlug]
              properties:
                confirmSlug:
                  type: string
      responses:
        '200':
          description: Organization deleted

  /organizations/{organizationId}/members:
    get:
      tags: [Organizations]
      summary: List organization members
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: role
          in: query
          schema:
            type: string
            enum: [owner, admin, member]
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Members list

  /organizations/{organizationId}/invitations:
    post:
      tags: [Organizations]
      summary: Invite member
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberRequest'
      responses:
        '201':
          description: Invitation sent

    get:
      tags: [Organizations]
      summary: List pending invitations
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Invitations list

  /workspaces/{workspaceId}:
    get:
      tags: [Workspaces]
      summary: Get workspace details
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
        - name: include
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'

    patch:
      tags: [Workspaces]
      summary: Update workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceRequest'
      responses:
        '200':
          description: Workspace updated

    delete:
      tags: [Workspaces]
      summary: Delete workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmName]
              properties:
                confirmName:
                  type: string
      responses:
        '200':
          description: Workspace deleted

  /organizations/{organizationId}/workspaces:
    post:
      tags: [Workspaces]
      summary: Create workspace
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '201':
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'

    get:
      tags: [Workspaces]
      summary: List workspaces
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Workspaces list

  /posts:
    post:
      tags: [Posts]
      summary: Create a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'

    get:
      tags: [Posts]
      summary: List posts
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: sort
          in: query
          schema:
            type: string
            default: -createdAt
        - name: filter[status]
          in: query
          schema:
            type: string
            enum: [draft, scheduled, publishing, published, failed]
        - name: filter[platform]
          in: query
          schema:
            type: string
        - name: filter[category]
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Posts list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPosts'

  /posts/{postId}:
    get:
      tags: [Posts]
      summary: Get post details
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
        - name: include
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Post details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'

    patch:
      tags: [Posts]
      summary: Update post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePostRequest'
      responses:
        '200':
          description: Post updated

    delete:
      tags: [Posts]
      summary: Delete post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Post deleted

  /posts/{postId}/publish:
    post:
      tags: [Posts]
      summary: Publish post immediately
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                platforms:
                  type: array
                  items:
                    type: string
                publishNow:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Post publishing

  /posts/schedule:
    post:
      tags: [Posts]
      summary: Schedule multiple posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkScheduleRequest'
      responses:
        '201':
          description: Posts scheduled

  /posts/{postId}/versions:
    post:
      tags: [Posts]
      summary: Create post version
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                label:
                  type: string
                mediaIds:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Version created

    get:
      tags: [Posts]
      summary: List post versions
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Versions list

  /posts/{postId}/analytics:
    get:
      tags: [Posts, Analytics]
      summary: Get post analytics
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
        - name: dateRange
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d, all]
      responses:
        '200':
          description: Post analytics

  /media/upload:
    post:
      tags: [Media]
      summary: Upload media file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, workspaceId]
              properties:
                file:
                  type: string
                  format: binary
                workspaceId:
                  type: string
                folder:
                  type: string
                alt:
                  type: string
                  maxLength: 500
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Media uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'

  /media:
    get:
      tags: [Media]
      summary: List media files
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: filter[type]
          in: query
          schema:
            type: string
            enum: [image, video, audio, document]
        - name: filter[folder]
          in: query
          schema:
            type: string
        - name: filter[tags]
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Media list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMedia'

  /media/{mediaId}:
    get:
      tags: [Media]
      summary: Get media details
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Media details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'

    patch:
      tags: [Media]
      summary: Update media metadata
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                alt:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                folder:
                  type: string
      responses:
        '200':
          description: Media updated

    delete:
      tags: [Media]
      summary: Delete media
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Media deleted

  /ai/generate/caption:
    post:
      tags: [AI]
      summary: Generate captions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateCaptionRequest'
      responses:
        '200':
          description: Captions generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGenerateResponse'

  /ai/generate/title:
    post:
      tags: [AI]
      summary: Generate titles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [topic, type]
              properties:
                topic:
                  type: string
                  minLength: 10
                  maxLength: 500
                type:
                  type: string
                  enum: [blog, video, article, newsletter, podcast]
                style:
                  type: string
                  enum: [listicle, how-to, question, statement, numbered]
                keywords:
                  type: array
                  items:
                    type: string
                count:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 5
      responses:
        '200':
          description: Titles generated

  /ai/generate/hashtags:
    post:
      tags: [AI]
      summary: Generate hashtags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, platform]
              properties:
                content:
                  type: string
                platform:
                  type: string
                count:
                  type: integer
                  minimum: 5
                  maximum: 30
                  default: 10
                mix:
                  type: string
                  enum: [trending, niche, branded, balanced]
                exclude:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Hashtags generated

  /ai/generate/thumbnail:
    post:
      tags: [AI]
      summary: Generate thumbnail ideas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, type]
              properties:
                content:
                  type: string
                type:
                  type: string
                  enum: [youtube, blog, instagram, thumbnail]
                style:
                  type: string
                  enum: [minimalist, bold, professional, creative, educational]
                count:
                  type: integer
                  minimum: 1
                  maximum: 5
                  default: 3
      responses:
        '200':
          description: Thumbnail ideas generated

  /ai/generate/content-ideas:
    post:
      tags: [AI]
      summary: Generate content ideas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [topic, platforms]
              properties:
                topic:
                  type: string
                platforms:
                  type: array
                  items:
                    type: string
                count:
                  type: integer
                  minimum: 1
                  maximum: 20
                  default: 10
                contentTypes:
                  type: array
                  items:
                    type: string
                    enum: [post, reel, story, carousel, video, article]
      responses:
        '200':
          description: Content ideas generated

  /ai/generate/script:
    post:
      tags: [AI]
      summary: Generate video/podcast scripts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [topic, type]
              properties:
                topic:
                  type: string
