            postFailed:
              type: boolean
            teamUpdates:
              type: boolean
            billingAlerts:
              type: boolean
            weeklyDigest:
              type: boolean
            productUpdates:
              type: boolean
        push:
          type: object
          properties:
            postPublished:
              type: boolean
            postFailed:
              type: boolean
            teamUpdates:
              type: boolean
            comments:
              type: boolean
            mentions:
              type: boolean
        digestFrequency:
          type: string
          enum: [daily, weekly, none]
        quietHoursStart:
          type: string
