        '200':
          description: Health status

  /integrations/{installationId}/sync:
    post:
      tags: [Integrations]
      summary: Trigger manual sync
      parameters:
        - name: installationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sync started

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Pagination cursor
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
      description: Results per page

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  code:
                    type: string
                  message:
                    type: string
            requestId:
              type: string
            timestamp:
              type: string
              format: date-time

    RegisterRequest:
      type: object
      required: [email, password, name, acceptTerms]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          minLength: 2
          maxLength: 100
        organizationName:
          type: string
          minLength: 2
          maxLength: 100
        acceptTerms:
          type: boolean
          enum: [true]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        mfaCode:
          type: string
          pattern: '^\d{6}$'

    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            accessToken:
              type: string
            refreshToken:
              type: string
            expiresIn:
              type: integer
            requiresMfa:
              type: boolean

    TokenResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            accessToken:
              type: string
            refreshToken:
              type: string
            expiresIn:
              type: integer

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        avatar:
          type: string
          format: uri
        bio:
          type: string
        timezone:
          type: string
        locale:
          type: string
        emailVerified:
          type: boolean
        mfaEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        bio:
          type: string
          maxLength: 500
        timezone:
          type: string
        locale:
          type: string

    Organization:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        website:
          type: string
          format: uri
        logo:
          type: string
          format: uri
        ownerId:
          type: string
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateOrganizationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        slug:
          type: string
          minLength: 3
          maxLength: 50
        description:
          type: string
          maxLength: 500
        website:
          type: string
          format: uri

    UpdateOrganizationRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        website:
          type: string
          format: uri
        logo:
          type: string
          format: uri

    Workspace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        organizationId:
          type: string
        createdBy:
          type: string
        settings:
          type: object
        memberCount:
          type: integer
        connectedAccounts:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          maxLength: 500
        settings:
          type: object

    UpdateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        settings:
          type: object

    Post:
      type: object
      properties:
        id:
          type: string
        workspaceId:
          type: string
        content:
          type: string
        platforms:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, scheduled, publishing, published, failed]
        media:
          type: array
          items:
            type: object
        tags:
          type: array
          items:
            type: string
        category:
          type: string
        scheduledAt:
          type: string
          format: date-time
        publishedAt:
          type: string
          format: date-time
        createdBy:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatePostRequest:
      type: object
      required: [workspaceId, content, platforms]
      properties:
        workspaceId:
          type: string
        content:
          type: string
          minLength: 1
          maxLength: 10000
        platforms:
          type: array
          minItems: 1
          items:
            type: string
            enum: [twitter, linkedin, facebook, instagram, tiktok, youtube, pinterest]
        mediaIds:
          type: array
          items:
            type: string
        scheduledAt:
          type: string
          format: date-time
        tags:
          type: array
          maxItems: 20
          items:
            type: string
        category:
          type: string
        variables:
          type: object

    UpdatePostRequest:
      type: object
      properties:
        content:
          type: string
        platforms:
          type: array
          items:
            type: string
        mediaIds:
          type: array
          items:
            type: string
        scheduledAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        category:
          type: string

    BulkScheduleRequest:
      type: object
      required: [workspaceId, posts]
      properties:
        workspaceId:
          type: string
        posts:
          type: array
          maxItems: 50
          items:
            type: object
            required: [content, platforms, scheduledAt]
            properties:
              content:
                type: string
              platforms:
                type: array
                items:
                  type: string
              scheduledAt:
                type: string
                format: date-time
              mediaIds:
                type: array
                items:
                  type: string
              tags:
                type: array
                items:
                  type: string

    Media:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        originalFilename:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        url:
          type: string
          format: uri
        thumbnailUrl:
          type: string
          format: uri
        dimensions:
          type: object
          properties:
            width:
              type: integer
            height:
              type: integer
        folder:
          type: string
        tags:
          type: array
          items:
            type: string
        alt:
          type: string
        createdAt:
          type: string
          format: date-time

    GenerateCaptionRequest:
      type: object
      required: [prompt, platform]
      properties:
        prompt:
          type: string
          minLength: 10
          maxLength: 500
        platform:
          type: string
          enum: [twitter, linkedin, facebook, instagram, tiktok]
        tone:
          type: string
          enum: [professional, casual, humorous, inspirational, informative]
        length:
          type: string
          enum: [short, medium, long]
        includeHashtags:
          type: boolean
          default: false
        includeEmojis:
          type: boolean
          default: false
        context:
          type: string
          maxLength: 1000
        count:
          type: integer
          minimum: 1
          maximum: 5
          default: 1

    AIGenerateResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            captions:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  content:
                    type: string
                  platform:
                    type: string
                  characterCount:
                    type: integer
                  hashtags:
                    type: array
                    items:
                      type: string
                  score:
                    type: integer
            tokensUsed:
              type: integer
            creditsRemaining:
              type: integer

    InviteMemberRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, member]
        message:
          type: string
          maxLength: 500
        workspaceIds:
          type: array
          items:
            type: string

    CreateWebhookRequest:
      type: object
      required: [workspaceId, name, url, events]
      properties:
        workspaceId:
          type: string
        name:
          type: string
          minLength: 2
          maxLength: 100
        url:
          type: string
          format: uri
        events:
          type: array
          minItems: 1
          items:
            type: string
        secret:
          type: string
        active:
          type: boolean
          default: true

    Webhook:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive, failing]
        secret:
          type: string
        lastTriggeredAt:
          type: string
          format: date-time
        failureCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreateTemplateRequest:
      type: object
      required: [workspaceId, name, type, platforms, content]
      properties:
        workspaceId:
          type: string
        name:
          type: string
          minLength: 2
          maxLength: 100
        type:
          type: string
          enum: [post, story, reel, carousel, banner, custom]
        platforms:
          type: array
          items:
            type: string
        description:
          type: string
          maxLength: 500
        content:
          type: string
          maxLength: 5000
        variables:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
                enum: [text, number, date, select, boolean]
              required:
                type: boolean
              defaultValue:
                type: string
              options:
                type: array
                items:
                  type: string
        media:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [image, video, any]
              required:
                type: boolean
              position:
                type: string
                enum: [top, bottom, inline]
        tags:
          type: array
          items:
            type: string

    Template:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        platforms:
          type: array
          items:
            type: string
        description:
          type: string
        content:
          type: string
        variables:
          type: array
          items:
            type: object
        media:
          type: array
          items:
            type: object
        tags:
          type: array
          items:
            type: string
        usageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Subscription:
      type: object
      properties:
        id:
          type: string
        plan:
          type: string
          enum: [free, starter, pro, business, enterprise]
        status:
          type: string
          enum: [active, cancelled, past_due, trialing]
        currentPeriod:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        pricing:
          type: object
          properties:
            amount:
              type: integer
            currency:
              type: string
            interval:
              type: string
        features:
          type: object
        usage:
          type: object
        nextBillingDate:
          type: string
          format: date-time
        cancelAt:
          type: string
          format: date-time

    NotificationPreferences:
      type: object
      properties:
