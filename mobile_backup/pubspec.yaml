name: ai_content_os
description: AI Content Distribution OS - Creator Operating System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Supabase
  supabase_flutter: ^2.5.0

  # UI Components
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Storage
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.3

  # HTTP
  http: ^1.2.0

  # Date/Time
  intl: ^0.19.0

  # Icons
  lucide_icons: ^0.257.0

  # Splash Screen
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
